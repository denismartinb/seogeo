  <script type="text/babel">

/* ============================================================
   Surface — App (real API integration)
   ============================================================ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "font": "Geist",
  "density": "regular",
  "scorecard": "ring",
  "accent": "oklch(0.67 0.18 45)"
}/*EDITMODE-END*/;

const FONTS = {
  "Geist": '"Geist", system-ui, sans-serif',
  "Hanken": '"Hanken Grotesk", system-ui, sans-serif',
  "Sistema": 'system-ui, -apple-system, "Segoe UI", sans-serif',
};
const ACCENTS = [
  { seo: "oklch(0.67 0.18 45)",  soft: "oklch(0.95 0.04 60)",  ink: "oklch(0.50 0.16 42)" },
  { seo: "oklch(0.62 0.16 250)", soft: "oklch(0.95 0.035 250)", ink: "oklch(0.48 0.15 250)" },
  { seo: "oklch(0.64 0.15 158)", soft: "oklch(0.95 0.04 158)",  ink: "oklch(0.46 0.14 158)" },
  { seo: "oklch(0.62 0.18 350)", soft: "oklch(0.95 0.04 350)",  ink: "oklch(0.48 0.16 350)" },
];
const findAccent = (v) => ACCENTS.find((a) => a.seo === v) || ACCENTS[0];

function Placeholder({ screen }) {
  const map = {
    history:     { icon: "clock",   title: "Historial",   desc: "Aquí vivirá el registro completo de análisis, con filtros por fecha, dominio y evolución del score." },
    settings:    { icon: "settings", title: "Ajustes",     desc: "Cuenta, equipo, dominios verificados, integraciones (Search Console, GA4) y facturación." },
    local:       { icon: "pin",      title: "SEO local",   desc: "Próximamente: análisis de ficha de Google Business, reseñas y visibilidad por ubicación en mapas." },
    competitors: { icon: "compare",  title: "Competencia", desc: "Próximamente: monitoriza tu visibilidad frente a competidores en ChatGPT, Perplexity y Gemini." },
  };
  const d = map[screen] || map.history;
  return (
    <div className="scroll-area" style={{ display: "grid", placeItems: "center" }}>
      <div style={{ textAlign: "center", maxWidth: 380, padding: 40 }}>
        <div style={{ width: 60, height: 60, borderRadius: 16, background: "var(--bg-2)", display: "grid", placeItems: "center", margin: "0 auto 18px", color: "var(--muted)" }}>
          <Icon name={d.icon} size={28} />
        </div>
        <h2 style={{ fontSize: 21, fontWeight: 700, margin: "0 0 8px", letterSpacing: "-0.02em" }}>{d.title}</h2>
        <p style={{ color: "var(--muted)", margin: 0, lineHeight: 1.55 }}>{d.desc}</p>
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState("input");
  const [mode, setMode] = useState("url");
  const [pendingInput, setPendingInput] = useState(null);
  const [analysisError, setAnalysisError] = useState(null);
  const [dataKey, setDataKey] = useState(0);
  const [loadingImps, setLoadingImps] = useState(false);

  const resultScreen = (m) => m === "domain" ? "domain" : m === "keyword" ? "keyword" : "dashboard";

  // Apply tweaks to document root
  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", t.theme);
    r.setAttribute("data-density", t.density);
    r.style.setProperty("--font-ui", FONTS[t.font] || FONTS.Geist);
    const a = findAccent(t.accent);
    r.style.setProperty("--seo", a.seo);
    r.style.setProperty("--seo-soft", a.soft);
    r.style.setProperty("--seo-ink", a.ink);
    r.style.setProperty("--accent", a.seo);
  }, [t.theme, t.density, t.font, t.accent]);

  // Load history whenever we land on input or history screen
  useEffect(() => {
    if (screen !== "input" && screen !== "history") return;
    window._loadRecents().then((items) => {
      const history = (items || []).map((i) => ({
        id: i.id,
        target: i.title,
        mode: i.type === "url" ? "URL" : i.type === "text" ? "Texto" : "Keyword",
        seo: i.seo_score || 0,
        geo: i.geo_score || 0,
        when: window.formatRelativeTime(i.created_at),
      }));
      if (window.SURFACE_DATA) window.SURFACE_DATA.HISTORY = history;
      setDataKey((k) => k + 1);
    }).catch(() => {});
  }, [screen === "input", screen === "history"]);

  const nav = (id) => {
    if (id === "dashboard") setScreen(resultScreen(mode));
    else setScreen(id);
  };

  // Called from InputScreen
  const startAnalyze = (m, val, opts) => {
    // Re-open saved analysis
    if (m === "__open__") {
      window._loadAnalysis(val).then((data) => {
        const m2 = data.type;
        const inp = data.input_data || {};
        setMode(m2);
        window.populateSurfaceData(
          m2,
          m2 === "url" ? inp.url : (inp.text || ""),
          { language: inp.language, keyword: inp.target_keyword },
          { analysis_id: data.id, result: data.result }
        );
        if (window.SURFACE_DATA) window.SURFACE_DATA.SUGGESTIONS = [];
        setDataKey((k) => k + 1);
        setScreen(resultScreen(m2));
      }).catch((e) => alert("Error cargando análisis: " + e.message));
      return;
    }
    setMode(m || "url");
    setPendingInput({ val, opts: opts || {} });
    setAnalysisError(null);
    setScreen("analyzing");
  };

  const handleAnalysisDone = (data) => {
    const { val, opts } = pendingInput || {};
    window.populateSurfaceData(mode, val, opts || {}, data);
    if (window.SURFACE_DATA) window.SURFACE_DATA.SUGGESTIONS = [];
    setDataKey((k) => k + 1);
    setScreen(resultScreen(mode));
  };

  const handleAnalysisError = (msg) => {
    setAnalysisError(msg);
    setScreen("input");
  };

  const handleLoadSuggestions = async () => {
    const id = window.SURFACE_DATA && window.SURFACE_DATA._analysisId;
    if (!id || loadingImps) return;
    setLoadingImps(true);
    try {
      const imps = await window._loadImprovements(id);
      if (window.SURFACE_DATA) {
        window.SURFACE_DATA.SUGGESTIONS = window.mapImprovements(
          imps.improvements,
          window.SURFACE_DATA.CONTENT || []
        );
      }
      setDataKey((k) => k + 1);
    } catch (e) {
      console.error("Error loading improvements:", e);
    } finally {
      setLoadingImps(false);
    }
  };

  const resultActive = ["dashboard", "domain", "keyword"].includes(screen);
  const noChrome = ["input", "analyzing", "competitors", "domain", "keyword"].includes(screen);

  let content;
  if (screen === "input")       content = <InputScreen onAnalyze={startAnalyze} analysisError={analysisError} />;
  else if (screen === "analyzing") content = (
    <AnalyzingScreen
      mode={mode}
      val={pendingInput?.val}
      opts={pendingInput?.opts}
      onDone={handleAnalysisDone}
      onError={handleAnalysisError}
    />
  );
  else if (screen === "dashboard")  content = <Dashboard key={dataKey} onNav={nav} scorecard={t.scorecard} />;
  else if (screen === "report")     content = <Report key={dataKey} scorecard={t.scorecard} onLoadSuggestions={handleLoadSuggestions} loadingImps={loadingImps} />;
  else if (screen === "domain")     content = <DomainReport onOpenPage={() => { setMode("url"); setScreen("dashboard"); }} />;
  else if (screen === "keyword")    content = <KeywordReport key={dataKey} onAnalyzeQuestion={() => setScreen("keyword")} />;
  else if (screen === "competitors") content = <Placeholder screen="competitors" />;
  else content = <Placeholder screen={screen} />;

  return (
    <div className="app-shell">
      <Sidebar active={screen === "analyzing" ? "input" : resultActive ? "dashboard" : screen} onNav={nav} />
      <div className="main-col">
        {!noChrome && <Topbar screen={screen} onNav={nav} scorecard={t.scorecard} />}
        <div key={screen} className="fade-in" style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
          {content}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Tema" />
        <TweakRadio label="Modo" value={t.theme} options={["light", "dark"]} onChange={(v) => setTweak("theme", v)} />
        <TweakColor label="Acento" value={t.accent}
          options={ACCENTS.map((a) => a.seo)}
          onChange={(v) => setTweak("accent", v)} />
        <TweakSection label="Tipografía" />
        <TweakSelect label="Fuente" value={t.font} options={Object.keys(FONTS)} onChange={(v) => setTweak("font", v)} />
        <TweakSection label="Interfaz" />
        <TweakRadio label="Densidad" value={t.density} options={["compact", "regular", "comfy"]} onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Tarjetas de score" />
        <TweakRadio label="Estilo" value={t.scorecard} options={["ring", "bar", "number"]} onChange={(v) => setTweak("scorecard", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
