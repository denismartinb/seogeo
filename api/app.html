<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surface — SEO + GEO Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   Surface — SEO + GEO Optimizer
   Design tokens & base styles
   ============================================================ */

:root {
  /* Type */
  --font-ui: "Geist", system-ui, -apple-system, sans-serif;
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", monospace;

  /* Warm light base */
  --bg: oklch(0.992 0.004 80);
  --bg-2: oklch(0.975 0.005 80);
  --surface: oklch(1 0 0);
  --surface-2: oklch(0.985 0.004 80);
  --elev: oklch(1 0 0);

  --ink: oklch(0.23 0.012 60);
  --ink-2: oklch(0.44 0.012 60);
  --muted: oklch(0.60 0.012 60);
  --faint: oklch(0.74 0.010 60);

  --border: oklch(0.915 0.005 70);
  --border-2: oklch(0.95 0.004 70);

  /* Brand: SEO = warm orange, GEO = indigo */
  --seo: oklch(0.67 0.18 45);
  --seo-soft: oklch(0.95 0.04 60);
  --seo-ink: oklch(0.50 0.16 42);

  --geo: oklch(0.58 0.16 285);
  --geo-soft: oklch(0.95 0.035 290);
  --geo-ink: oklch(0.48 0.16 285);

  --accent: var(--seo);

  /* Semantic scoring */
  --good: oklch(0.70 0.15 152);
  --good-soft: oklch(0.95 0.05 152);
  --warn: oklch(0.78 0.14 78);
  --warn-soft: oklch(0.96 0.06 85);
  --poor: oklch(0.63 0.19 27);
  --poor-soft: oklch(0.95 0.05 30);

  /* Shadows — soft, Apple-ish */
  --sh-sm: 0 1px 2px oklch(0.2 0.02 60 / 0.05), 0 1px 1px oklch(0.2 0.02 60 / 0.04);
  --sh-md: 0 2px 6px oklch(0.2 0.02 60 / 0.06), 0 8px 24px oklch(0.2 0.02 60 / 0.06);
  --sh-lg: 0 4px 12px oklch(0.2 0.02 60 / 0.08), 0 24px 48px oklch(0.2 0.02 60 / 0.10);
  --ring: 0 0 0 3px oklch(0.67 0.18 45 / 0.16);

  /* Radii */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;

  /* Density (regular default) */
  --pad: 20px;
  --gap: 16px;
  --row-h: 44px;
  --fs-base: 15px;
  --fs-sm: 13px;
  --fs-xs: 11.5px;
}

[data-density="compact"] {
  --pad: 14px;
  --gap: 11px;
  --row-h: 38px;
  --fs-base: 14px;
  --fs-sm: 12.5px;
  --fs-xs: 11px;
}
[data-density="comfy"] {
  --pad: 26px;
  --gap: 22px;
  --row-h: 50px;
  --fs-base: 16px;
  --fs-sm: 14px;
  --fs-xs: 12px;
}

[data-theme="dark"] {
  --bg: oklch(0.19 0.008 70);
  --bg-2: oklch(0.22 0.008 70);
  --surface: oklch(0.235 0.009 70);
  --surface-2: oklch(0.26 0.009 70);
  --elev: oklch(0.27 0.010 70);

  --ink: oklch(0.96 0.005 80);
  --ink-2: oklch(0.80 0.008 80);
  --muted: oklch(0.66 0.010 80);
  --faint: oklch(0.50 0.010 80);

  --border: oklch(0.34 0.010 70);
  --border-2: oklch(0.30 0.009 70);

  --seo-soft: oklch(0.34 0.06 50);
  --geo-soft: oklch(0.34 0.06 285);
  --good-soft: oklch(0.34 0.06 152);
  --warn-soft: oklch(0.36 0.06 85);
  --poor-soft: oklch(0.34 0.06 30);

  --sh-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --sh-md: 0 2px 8px oklch(0 0 0 / 0.35), 0 8px 24px oklch(0 0 0 / 0.30);
  --sh-lg: 0 8px 28px oklch(0 0 0 / 0.45);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  font-size: var(--fs-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.01em;
}

#root { height: 100%; }

button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

::selection { background: oklch(0.67 0.18 45 / 0.22); }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }

/* Scrollbars */
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
  border: 3px solid var(--bg);
}
::-webkit-scrollbar-thumb:hover { background: var(--faint); }
::-webkit-scrollbar-track { background: transparent; }

/* ---- Layout shell ---- */
.app-shell {
  display: grid;
  grid-template-columns: 248px 1fr;
  height: 100%;
  overflow: hidden;
}
[data-density="compact"] .app-shell { grid-template-columns: 220px 1fr; }

.main-col {
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

/* ---- Utility ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-sm);
}

.fade-in { animation: fadeIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
.rise-in { animation: riseIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes fadeIn { from { transform: translateY(4px); } to { transform: none; } }
@keyframes riseIn { from { transform: translateY(10px); } to { transform: none; } }

.stagger > * { animation: riseIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
.stagger > *:nth-child(1) { animation-delay: 0.02s; }
.stagger > *:nth-child(2) { animation-delay: 0.07s; }
.stagger > *:nth-child(3) { animation-delay: 0.12s; }
.stagger > *:nth-child(4) { animation-delay: 0.17s; }
.stagger > *:nth-child(5) { animation-delay: 0.22s; }
.stagger > *:nth-child(6) { animation-delay: 0.27s; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001s !important; }
}

  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>

(function() {
  // Session ID
  var SID = localStorage.getItem('sg_session_id');
  if (!SID) {
    SID = 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('sg_session_id', SID);
  }
  window._sessionId = SID;

  var _APP_KEY = '__APP_API_KEY__';  // replaced by server at /app
  function getKey() { return localStorage.getItem('sg_api_key') || _APP_KEY || ''; }
  function headers(extra) {
    var h = Object.assign({'Content-Type':'application/json'}, extra||{});
    var k = getKey();
    if (k) h['x-api-key'] = k;
    return h;
  }

  async function apiCall(method, path, body) {
    var opts = { method: method, headers: headers() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    var res = await fetch(window.location.origin + path, opts);
    var data = await res.json();
    if (!res.ok) throw new Error(data.detail || data.error || ('HTTP ' + res.status));
    return data;
  }

  window._runAnalysis = async function(mode, val, opts) {
    var body = { type: mode, language: opts.language || 'es', session_id: SID };
    if (mode === 'url')     { body.url = val; if (opts.keyword) body.target_keyword = opts.keyword; }
    else if (mode === 'text') { body.text = val; if (opts.url) body.url = opts.url; if (opts.keyword) body.target_keyword = opts.keyword; }
    else                    { body.text = val; }
    return apiCall('POST', '/v2/analyze', body);
  };

  window._loadRecents = function() { return apiCall('GET', '/v2/analyses?session_id=' + encodeURIComponent(SID) + '&limit=30'); };
  window._loadAnalysis = function(id) { return apiCall('GET', '/v2/analyses/' + id); };
  window._loadImprovements = function(id) { return apiCall('POST', '/v2/analyses/' + id + '/improvements'); };
  window._deleteAnalysis = function(id) { return apiCall('DELETE', '/v2/analyses/' + id); };

  // populateSurfaceData
  window.populateSurfaceData = function(mode, inputVal, opts, data) {
    var result = data.result || {};
    var seo = result.seo || {};
    var geo = result.geo || {};
    var isKw = (mode === 'keyword');
    var citLike = geo.citation_likelihood || 'baja';
    var geoS = geo.geo_score || 0;
    var base = citLike === 'alta' ? Math.round(geoS*0.7) : citLike === 'media' ? Math.round(geoS*0.45) : Math.round(geoS*0.2);

    var targetUrl = mode === 'url' ? (inputVal||'') : (opts.url || '(texto)');
    var domain = '';
    try { domain = new URL('https://' + targetUrl.replace(/^https?:\/\//,'')).hostname; } catch(e) { domain = targetUrl; }

    var seoS = seo.seo_score || 0;
    var SCORES = isKw ? {seo:0,geo:0} : {seo:seoS,geo:geoS};
    var sovShare = Math.round(geoS*0.4);

    var prevHistory = (window.SURFACE_DATA && window.SURFACE_DATA.HISTORY) || [];
    window.SURFACE_DATA = {
      PRODUCT: { name: 'Surface', tagline: 'Optimiza para búsqueda y para IA' },
      TARGET: {
        mode: mode, url: targetUrl, domain: domain,
        title: isKw ? ('Keyword: ' + inputVal) : (seo.title || 'Análisis'),
        favicon: ((seo.title||inputVal||'S').slice(0,2)).toUpperCase(),
        fetchedAt: new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}),
        words: isKw ? 0 : ((opts.text||inputVal||'').split(/\s+/).filter(Boolean).length),
        query: opts.keyword || seo.focus_keyword || inputVal || '',
      },
      SCORES: SCORES,
      ENGINES: [
        {id:'chatgpt', name:'ChatGPT', cited:citLike==='alta', mention:Math.min(95,Math.round(base*0.85)), note: citLike==='alta'?'Te cita como fuente relevante':citLike==='media'?'Te menciona ocasionalmente':'No detectado en respuestas'},
        {id:'perplexity', name:'Perplexity', cited:citLike!=='baja', mention:Math.min(95,Math.round(base*1.15)), note: citLike!=='baja'?'Citado como fuente secundaria':'Sin aparición detectada'},
        {id:'aio', name:'Google AI Overviews', cited:false, mention:Math.min(95,Math.round(base*0.65)), note:'Sin aparición en el resumen IA'},
        {id:'gemini', name:'Gemini', cited:citLike==='alta', mention:Math.min(95,Math.round(base*0.75)), note: citLike==='alta'?'Citado con enlace directo':'Aparece sin enlace directo'},
      ],
      CATEGORIES: (function() {
        var sb = seo.score_breakdown || {};
        var gb = geo.score_breakdown || {};
        // Max pts per block → convert to 0-100 scale for display
        function pct(v, max) { return v==null ? null : Math.round(Math.min(100, (v/max)*100)); }
        return [
          {id:'title_h1',      lane:'seo', label:'Título y H1',           score: pct(sb.title_h1,15)      || Math.max(10,seoS-15), items:'15 pts'},
          {id:'meta',          lane:'seo', label:'Meta description',       score: pct(sb.meta_description,10) || Math.max(10,seoS-20), items:'10 pts'},
          {id:'structure',     lane:'seo', label:'Estructura de contenido',score: pct(sb.content_structure,15) || Math.max(10,seoS-10), items:'15 pts'},
          {id:'quality',       lane:'seo', label:'Calidad y extensión',    score: pct(sb.content_quality,20)  || Math.max(10,seoS-5),  items:'20 pts'},
          {id:'keywords',      lane:'seo', label:'Keywords y optimización',score: pct(sb.keywords,20)          || Math.max(10,seoS-8),  items:'20 pts'},
          {id:'technical',     lane:'seo', label:'Schema y técnico',       score: pct(sb.technical,20)         || Math.max(10,seoS-12), items:'20 pts'},
          {id:'direct_answer', lane:'geo', label:'Respuesta directa',      score: pct(gb.direct_answer,20)     || Math.max(10,geoS-15), items:'20 pts'},
          {id:'factual',       lane:'geo', label:'Densidad factual',       score: pct(gb.factual_density,20)   || Math.max(10,geoS-20), items:'20 pts'},
          {id:'entities',      lane:'geo', label:'Cobertura de entidades', score: pct(gb.entity_coverage,20)   || Math.max(10,geoS-18), items:'20 pts'},
          {id:'ai_structure',  lane:'geo', label:'Estructura para IA',     score: pct(gb.ai_structure,20)      || Math.max(10,geoS-12), items:'20 pts'},
          {id:'authority',     lane:'geo', label:'Autoridad E-E-A-T',      score: pct(gb.authority,10)         || Math.max(10,geoS-5),  items:'10 pts'},
          {id:'schema_geo',    lane:'geo', label:'Schema.org para IA',     score: pct(gb.structured_data,10)   || Math.max(10,geoS-8),  items:'10 pts'},
        ];
      })(),
      CONTENT: (function() {
        var blocks = [];
        // Use the actual current H1 from the page (not the LLM-suggested one)
        var meta = result._page_metadata || {};
        var actualH1 = meta.h1 && meta.h1.length > 0 ? meta.h1[0] : null;
        var h1Text = actualH1 ? actualH1.text : (seo.title || '');
        var h1Hidden = actualH1 && actualH1.hidden;
        if (h1Text) blocks.push({
          id:'h1', type:'h1',
          text: h1Text + (h1Hidden ? ' [visualmente oculto]' : ''),
          _hidden: h1Hidden, _actual: true
        });
        var rawText = (result._original_text || opts.text || (mode!=='url' ? inputVal : ''));
        if (rawText && rawText.length > 50) {
          // Parse markdown-formatted text (from Firecrawl) or plain text
          var lines = rawText.split(/\n/).map(function(l){return l.trimEnd();});
          var pCount=0, h2Count=0, blockId=0;
          lines.forEach(function(line) {
            if(pCount>=8) return;
            var t = line.trim();
            if(!t) return;
            // Markdown headings
            if(/^# /.test(t)) {
              if(blocks.length===0 || blocks[0].type!=='h1') // only first h1
                blocks.unshift({id:'h1',type:'h1',text:t.replace(/^# /,'')});
            } else if(/^## /.test(t) && h2Count<4) {
              blocks.push({id:'h2_'+(blockId++),type:'h2',text:t.replace(/^## /,'')}); h2Count++;
            } else if(/^### /.test(t) && h2Count<5) {
              blocks.push({id:'h2_'+(blockId++),type:'h2',text:t.replace(/^### /,'')}); h2Count++;
            } else if(t.length>40) {
              // Strip markdown bold/italic for plain display
              var clean = t.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/`([^`]+)`/g,'$1');
              blocks.push({id:'p'+(blockId++),type:'p',text:clean.slice(0,600)}); pCount++;
            }
          });
        } else {
          if(geo.answer_ready_summary) blocks.push({id:'p1',type:'p',text:geo.answer_ready_summary});
          if(geo.ai_snippet) blocks.push({id:'p2',type:'p',text:geo.ai_snippet});
          if(seo.meta_description) blocks.push({id:'p3',type:'p',text:seo.meta_description});
        }
        return blocks;
      })(),
      SUGGESTIONS: [],
      GEO_SOV: {share:sovShare, avgPos:sovShare>40?4:sovShare>25?6:9, projPos:Math.max(2,Math.round((sovShare>40?4:6)*0.6)), category:seo.focus_keyword||inputVal||'', rivals:[]},
      DOMAIN: {domain:domain, pagesCrawled:0, seo:seoS, geo:geoS, issues:[], pages:[]},
      KEYWORD: {
        query: isKw ? inputVal : (seo.focus_keyword||''),
        intent:'Informativa', volume:0, yourPosSerp:null, yourPosAi:null,
        serp:[], aiBrands:[],
        engines: [{id:'chatgpt',name:'ChatGPT',present:citLike==='alta',cited:citLike==='alta'},{id:'perplexity',name:'Perplexity',present:citLike!=='baja',cited:citLike!=='baja'},{id:'aio',name:'Google AI Overviews',present:false},{id:'gemini',name:'Gemini',present:citLike==='alta'}],
        related: isKw
          ? ((result.keywords||[]).slice(0,6).map(function(k){return{q:k.keyword,volume:0,intent:k.intent,you:false};}))
          : ((geo.llm_query_matches||[]).slice(0,6).map(function(q){return{q:q,volume:0,intent:'Informativa',you:false};})),
      },
      COMPETITORS:[], PROMPTS:[], BRAND_RANKING:[],
      COVERAGE:{days:[],series:[]},
      HISTORY: prevHistory,
      _analysisId: data.analysis_id,
      _pageMetadata: result._page_metadata || {},
      _rawSeo: seo, _rawGeo: geo,
    };
  };

  // mapImprovements
  window.mapImprovements = function(apiImps, content) {
    return (apiImps||[]).map(function(imp) {
      var impact = (imp.estimated_seo_delta||0) + (imp.estimated_geo_delta||0);
      var effort = {quick:'Bajo',medium:'Medio',involved:'Alto'}[imp.effort]||'Bajo';
      var priority = (imp.priority==='high' && impact>=12) ? 'Quick win' : imp.priority==='high' ? 'Alto impacto' : 'Menor';
      var editsBlock=null, addsBlock=null;
      if (imp.example) {
        if (imp.field==='title_tag'||imp.field==='h1') {
          if ((content||[]).find(function(b){return b.id==='h1';})) editsBlock={id:'h1',text:imp.example};
        } else if (['answer_format','ai_snippet','answer_block','citation_signals','content_depth'].includes(imp.field)) {
          addsBlock={id:'ans-'+imp.id,type:'answer',after:'h1',text:imp.example};
        } else if (['schema_markup','faq','structured_data'].includes(imp.field)) {
          addsBlock={id:'faq-'+imp.id,type:'faq',after:((content||[]).find(function(b){return b.type==='p';})||{}).id||'h1',text:imp.example};
        } else if (['meta_description'].includes(imp.field)) {
          // meta_description not shown in content preview (it's a <head> tag)
        } else {
          // Generic content improvement — add as paragraph after last block
          var lastBlock=(content||[])[Math.max(0,(content||[]).length-1)];
          addsBlock={id:'gen-'+imp.id,type:'p',after:(lastBlock||{}).id||'h1',text:imp.example};
        }
      }
      return { id:imp.id, lane:imp.category, title:imp.suggestion, desc:imp.current_issue, impact:impact, effort:effort, priority:priority, kind:(editsBlock||addsBlock)?'content':'global', editsBlock:editsBlock, addsBlock:addsBlock };
    });
  };

  // formatRelativeTime
  window.formatRelativeTime = function(iso) {
    try {
      var d = new Date(iso + (iso.endsWith('Z')?'':'Z'));
      var diff = (Date.now()-d)/1000;
      if (diff<60) return 'hace unos segundos';
      if (diff<3600) return 'hace '+Math.round(diff/60)+' min';
      if (diff<86400) return 'hace '+Math.round(diff/3600)+' h';
      if (diff<86400*7) return 'hace '+Math.round(diff/86400)+' días';
      return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    } catch(e) { return ''; }
  };

  // Initial SURFACE_DATA skeleton
  window.SURFACE_DATA = {
    PRODUCT:{name:'Surface',tagline:'Optimiza para búsqueda y para IA'},
    TARGET:{mode:'url',url:'',domain:'',title:'',favicon:'',fetchedAt:'',words:0,query:''},
    SCORES:{seo:0,geo:0},
    ENGINES:[
      {id:'chatgpt',name:'ChatGPT',cited:false,mention:0,note:''},
      {id:'perplexity',name:'Perplexity',cited:false,mention:0,note:''},
      {id:'aio',name:'Google AI Overviews',cited:false,mention:0,note:''},
      {id:'gemini',name:'Gemini',cited:false,mention:0,note:''},
    ],
    CATEGORIES:[], CONTENT:[], SUGGESTIONS:[], GEO_SOV:{share:0,avgPos:0,projPos:0,category:'',rivals:[]},
    DOMAIN:{domain:'',pagesCrawled:0,seo:0,geo:0,issues:[],pages:[]},
    KEYWORD:{query:'',intent:'',volume:0,yourPosSerp:null,yourPosAi:null,serp:[],aiBrands:[],engines:[],related:[]},
    COMPETITORS:[],PROMPTS:[],BRAND_RANKING:[],COVERAGE:{days:[],series:[]},
    HISTORY:[],
  };
})();

  </script>

  <script type="text/babel">

/* BEGIN USAGE */
// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
// Exports (to window): useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider,
//   TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton.

// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so

// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",

//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,

function MiniScore({ label, v, lane }) {
  const lc = laneColor(lane);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

      <span className="mono" style={{ fontSize: 15, fontWeight: 600, color: "var(--ink)" }}>{v}</span>
    </div>
  );
}

/* ---------------- Analyzing (real API) ---------------- */
function AnalyzingScreen({ mode, val, opts, onDone, onError }) {
  const steps = [
    { label: "Rastreando el contenido", icon: "globe" },
    { label: "Evaluando señales SEO", icon: "search" },
    { label: "Probando en motores generativos", icon: "spark" },
    { label: "Midiendo citabilidad y autoridad", icon: "target" },
    { label: "Generando sugerencias priorizadas", icon: "bolt" },
  ];
  const [step, setStep] = useState(0);
  const [apiDone, setApiDone] = useState(false);
  const [apiResult, setApiResult] = useState(null);
  const [apiError, setApiError] = useState(null);

  const displayTarget = (mode === "text" ? (val || "").slice(0, 60) + ((val||"").length > 60 ? "…" : "") : val) || "…";

  // Make real API call on mount
  useEffect(() => {
    window._runAnalysis(mode, val, opts || {})
      .then((data) => { setApiResult(data); setApiDone(true); })
      .catch((e) => { setApiError(e.message || "Error inesperado"); });
  }, []);

  // Advance animation steps
  useEffect(() => {
    if (step < steps.length) {
      const t = setTimeout(() => setStep((s) => s + 1), step === 0 ? 700 : 850);
      return () => clearTimeout(t);
    }
  }, [step]);

  // When both animation done AND api done → forward
  // Forward to results when animation is done AND API is done
  useEffect(() => {
    if (step >= steps.length && apiDone && apiResult) {
      const t = setTimeout(() => onDone && onDone(apiResult), 400);
      return () => clearTimeout(t);
    }
  }, [step, apiDone, apiResult]);

  // Handle API errors — stay on screen, show message
  useEffect(() => {
    if (apiError) {
      // Don't go back automatically — show error on screen, let user retry
    }
  }, [apiError]);

  return (
    <div className="scroll-area" style={{ display: "grid", placeItems: "center" }}>
      <div style={{ width: "100%", maxWidth: 460, padding: 32 }}>
        <div className="rise-in" style={{ textAlign: "center", marginBottom: 30 }}>
          <div style={{ position: "relative", width: 80, height: 80, margin: "0 auto 22px" }}>
            <div className="pulse-ring" style={{ position: "absolute", inset: 0, borderRadius: 99, border: "2px solid var(--seo)" }} />
            <div style={{ position: "absolute", inset: 0, borderRadius: 20, background: "linear-gradient(145deg, var(--seo), oklch(0.6 0.18 30))", display: "grid", placeItems: "center", boxShadow: "var(--sh-md)" }}>
              <Icon name="spark" size={36} stroke={1.6} style={{ color: "white" }} />
            </div>
          </div>
          <h2 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 6px", letterSpacing: "-0.02em" }}>Analizando tu contenido</h2>
          <div className="mono" style={{ fontSize: "var(--fs-sm)", color: "var(--muted)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{displayTarget}</div>
        </div>
        <div className="card" style={{ padding: "10px 6px" }}>
          {steps.map((s, i) => {
            const done = i < step, active = i === step;
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 13, padding: "11px 16px", opacity: i > step ? 0.4 : 1, transition: "opacity 0.3s ease" }}>
                <span style={{
                  width: 28, height: 28, borderRadius: 99, display: "grid", placeItems: "center", flexShrink: 0,
                  background: done ? "var(--good-soft)" : active ? "var(--seo-soft)" : "var(--bg-2)",
                  color: done ? "var(--good)" : active ? "var(--seo)" : "var(--faint)",
                }}>
                  {done ? <Icon name="check" size={15} stroke={3} /> : active ? <span className="spin" style={{ width: 14, height: 14, borderRadius: 99, border: "2px solid var(--seo)", borderTopColor: "transparent" }} /> : <Icon name={s.icon} size={15} />}
                </span>
                <span style={{ fontSize: "var(--fs-base)", fontWeight: active ? 600 : 500, color: done ? "var(--ink-2)" : active ? "var(--ink)" : "var(--muted)" }}>{s.label}</span>
                {done && <Icon name="check" size={14} style={{ marginLeft: "auto", color: "var(--good)" }} />}
              </div>
            );
          })}
        </div>
        {apiError && (
          <div style={{ marginTop: 14, padding: "14px 16px", borderRadius: 12, background: "var(--poor-soft)", border: "1px solid var(--poor)", color: "var(--poor)", fontSize: "var(--fs-sm)", fontWeight: 500 }}>
            <div style={{ fontWeight: 700, marginBottom: 4 }}>Error al analizar</div>
            <div>{apiError}</div>
            <button onClick={() => onError && onError(apiError)}
              style={{ marginTop: 10, padding: "6px 14px", borderRadius: 8, border: "1px solid var(--poor)", background: "transparent", color: "var(--poor)", fontSize: "var(--fs-xs)", fontWeight: 700, cursor: "pointer" }}>
              ← Volver e intentarlo de nuevo
            </button>
          </div>
        )}
      </div>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.7s linear infinite; }
        @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
        .pulse-ring { animation: pulseRing 1.6s ease-out infinite; }
      `}</style>
    </div>
  );
}

Object.assign(window, { InputScreen, AnalyzingScreen, MiniScore });

  </script>

  <script type="text/babel">
/* ============================================================
   Surface — Report: suggestions + live preview + live score
   ============================================================ */

function buildBlocks(selectedIds) {
  const D = window.SURFACE_DATA;
  const sel = D.SUGGESTIONS.filter((s) => selectedIds.includes(s.id));
  let list = D.CONTENT.map((b) => ({ ...b }));
  // edits
  sel.forEach((s) => {
    if (s.editsBlock) {
      const i = list.findIndex((b) => b.id === s.editsBlock.id);
      if (i >= 0) list[i] = { ...list[i], text: s.editsBlock.text, edited: true, lane: s.lane, by: s.title };
    }
  });
  // adds
  sel.forEach((s) => {
    if (s.addsBlock) {
      const i = list.findIndex((b) => b.id === s.addsBlock.after);
      const blk = { ...s.addsBlock, added: true, lane: s.lane, by: s.title };
      if (i >= 0) list.splice(i + 1, 0, blk); else list.push(blk);
    }
  });
  return list;
}

function ContentBlock({ b, mode }) {
  const show = mode === "after";
  const lc = b.lane ? laneColor(b.lane) : laneColor("seo");
  const highlight = show && (b.added || b.edited);
  const wrapStyle = highlight ? {
    position: "relative", background: lc.soft, borderRadius: 10, padding: "12px 14px",
    margin: "10px 0", borderLeft: "3px solid " + lc.c,
    animation: "blockIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards",
  } : { margin: "0 0 12px" };

  const Tag = highlight ? (
    <span style={{ position: "absolute", top: -9, left: 12, display: "inline-flex", alignItems: "center", gap: 4, fontSize: 9.5, fontWeight: 700, letterSpacing: "0.04em", color: "white", background: lc.c, padding: "2px 7px", borderRadius: 6 }}>
      <Icon name={b.added ? "plus" : "check"} size={9} stroke={3} />{b.added ? "AÑADIDO" : "EDITADO"}
    </span>
  ) : null;

  let inner;
  if (b.type === "h1") inner = <h1 style={{ fontSize: 25, fontWeight: 700, margin: 0, letterSpacing: "-0.025em", lineHeight: 1.15 }}>{b.text}</h1>;
  else if (b.type === "h2") inner = <h2 style={{ fontSize: 18, fontWeight: 700, margin: "0", letterSpacing: "-0.01em" }}>{b.text}</h2>;
  else if (b.type === "p") inner = <p style={{ margin: 0, fontSize: 15, lineHeight: 1.65, color: "var(--ink-2)" }}>{b.text}</p>;
  else if (b.type === "answer") inner = (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "var(--fs-xs)", fontWeight: 700, color: lc.ink, marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.05em" }}>
        <Icon name="spark" size={13} stroke={2} /> Respuesta directa
      </div>
      <p style={{ margin: 0, fontSize: 15, lineHeight: 1.6, color: "var(--ink)", fontWeight: 500 }}>{b.text}</p>
    </div>
  );
  else if (b.type === "faq") inner = (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "var(--fs-xs)", fontWeight: 700, color: lc.ink, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.05em" }}>
        <Icon name="list" size={13} stroke={2} /> Preguntas frecuentes
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {b.text.split(" · ").map((q, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 600, color: "var(--ink)" }}>
            <Icon name="chevR" size={13} style={{ color: lc.c }} /> {q}
          </div>
        ))}
      </div>
    </div>
  );

  return <div style={wrapStyle}>{Tag}{inner}</div>;
}

function Segmented({ value, onChange, options, size }) {
  return (
    <div style={{ display: "flex", background: "var(--bg-2)", borderRadius: 9, padding: 3, gap: 2 }}>
      {options.map(([id, lb]) => (
        <button key={id} onClick={() => onChange(id)}
          style={{
            padding: size === "sm" ? "4px 10px" : "5px 14px", borderRadius: 7, border: "none", fontSize: "var(--fs-sm)", fontWeight: 600, cursor: "pointer",
            background: value === id ? "var(--surface)" : "transparent", color: value === id ? "var(--ink)" : "var(--muted)",
            boxShadow: value === id ? "var(--sh-sm)" : "none", transition: "all 0.14s ease", whiteSpace: "nowrap",
          }}>{lb}</button>
      ))}
    </div>
  );
}

function PreviewPane({ selectedIds, appliedIds = [], mode, setMode }) {
  const D = window.SURFACE_DATA;
  const [maxed, setMaxed] = useState(false);
  const [device, setDevice] = useState("desktop");
  const [view, setView] = useState("seo");
  const afterIds = [...appliedIds, ...selectedIds.filter((id) => !appliedIds.includes(id))];
  const blocks = mode === "before" ? buildBlocks(appliedIds) : buildBlocks(afterIds);
  const contentChanges = afterIds.filter((id) => { const s = D.SUGGESTIONS.find((x) => x.id === id); return s && s.kind === "content"; }).length;
  const newChanges = selectedIds.filter((id) => { const s = D.SUGGESTIONS.find((x) => x.id === id); return s && s.kind === "content"; }).length;

  const controls = (big) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
      <Segmented value={view} onChange={setView} options={[["seo", "🔍 Vista SEO"], ["geo", "🤖 Vista GEO"], ["real", "📸 Página real"]]} size="sm" />
      {(view === "seo" || view === "geo") && <Segmented value={mode} onChange={setMode} options={[["before", "Antes"], ["after", "Después"]]} size="sm" />}
      <Segmented value={device} onChange={setDevice} options={[["desktop", "Escritorio"], ["mobile", "Móvil"]]} size="sm" />
      <button onClick={() => setMaxed(!big)} title={big ? "Cerrar" : "Ampliar"}
        style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--border)", background: "var(--surface)", color: "var(--ink-2)", display: "grid", placeItems: "center", cursor: "pointer", flexShrink: 0 }}>
        <Icon name={big ? "x" : "ext"} size={15} />
      </button>
    </div>
  );

  const pageMock = (big) => {
    const w = device === "mobile" ? 390 : big ? 940 : "100%";
    return (
      <div className="card" style={{ flex: big ? "none" : 1, height: big ? "100%" : "auto", overflow: "hidden", display: "flex", flexDirection: "column", width: w, maxWidth: "100%", margin: (device === "mobile" || big) ? "0 auto" : 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 14px", borderBottom: "1px solid var(--border-2)", background: "var(--bg-2)", flexShrink: 0 }}>
          <span style={{ display: "flex", gap: 5 }}>
            {["#e5675a", "#e8b84b", "#5fb85f"].map((c) => <span key={c} style={{ width: 9, height: 9, borderRadius: 99, background: c, opacity: 0.65 }} />)}
          </span>
          <div className="mono" style={{ flex: 1, fontSize: 11, color: "var(--muted)", background: "var(--surface)", borderRadius: 6, padding: "3px 10px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", border: "1px solid var(--border-2)" }}>
            {D.TARGET.url}
          </div>
        </div>
        <div className="scroll-area" style={{ padding: view === "real" ? 0 : device === "mobile" ? "20px 18px" : "26px 30px" }}>
          {view === "real"
            ? <RealPageView ids={afterIds} appliedIds={appliedIds} />
            : view === "geo"
              ? <GeoTextView blocks={blocks} mode={mode} contentChanges={contentChanges} />
              : <>
                  {blocks.map((b, i) => <ContentBlock key={b.id + i} b={b} mode={mode} />)}
                  {mode === "after" && contentChanges === 0 && (
                    <div style={{ textAlign: "center", color: "var(--faint)", fontSize: "var(--fs-sm)", padding: "24px 0", borderTop: "1px dashed var(--border)", marginTop: 14 }}>
                      Marca sugerencias de contenido → para ver el antes/después aquí
                    </div>
                  )}
                </>}
        </div>
      </div>
    );
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", minWidth: 0, height: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, padding: "0 4px 12px", flexShrink: 0, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="eye" size={16} style={{ color: "var(--muted)" }} />
          <span style={{ fontWeight: 700, fontSize: "var(--fs-sm)" }}>
            {view === "real"
              ? <><span>Página real</span> <span style={{ color: "var(--faint)", fontWeight: 500 }}>· renderizado visual</span></>
              : view === "geo"
                ? <><span>Vista GEO</span> <span style={{ color: "var(--faint)", fontWeight: 500 }}>· texto que leen los LLMs para citarte</span></>
                : <><span>Vista SEO</span> <span style={{ color: "var(--faint)", fontWeight: 500 }}>· estructura que lee Googlebot</span></>}
          </span>
          {newChanges > 0 && <Pill color="var(--geo-ink)" soft="var(--geo-soft)">{newChanges} cambio{newChanges > 1 ? "s" : ""}</Pill>}
        </div>
        {controls(false)}
      </div>
      {pageMock(false)}

      {maxed && (
        <div className="fade-in" style={{ position: "fixed", inset: 0, zIndex: 60, background: "oklch(0.26 0.02 60 / 0.58)", backdropFilter: "blur(4px)", display: "flex", flexDirection: "column", padding: 24 }} onClick={() => setMaxed(false)}>
          <div onClick={(e) => e.stopPropagation()} style={{ display: "flex", flexDirection: "column", height: "100%", maxWidth: 1100, width: "100%", margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 12, color: "white", flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <Icon name="eye" size={17} /><span style={{ fontWeight: 700 }}>{view === "real" ? "Página real ampliada" : view === "geo" ? "Vista GEO ampliada" : "Vista SEO ampliada"}</span>
                <span className="mono" style={{ fontSize: "var(--fs-xs)", opacity: 0.8 }}>{D.TARGET.url}</span>
              </div>
              {controls(true)}
            </div>
            <div style={{ flex: 1, minHeight: 0, display: "flex" }}>{pageMock(true)}</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- "Página real" mode: stylized live-page screenshot with pins ---- */
const PIN_POS = {
  meta: { t: 6, l: 14 }, schema: { t: 6, l: 86 }, "h1-keyword": { t: 16, l: 50 },
  author: { t: 23, l: 80 }, "answer-block": { t: 31, l: 30 }, "heading-hierarchy": { t: 46, l: 17 },
  "stats-source": { t: 62, l: 66 }, "internal-links": { t: 74, l: 34 }, faq: { t: 86, l: 50 },
};

function Pin({ n, s, applied, pos }) {
  const [h, setH] = useState(false);
  const lc = laneColor(s.lane);
  return (
    <div style={{ position: "absolute", top: pos.t + "%", left: pos.l + "%", transform: "translate(-50%,-50%)", zIndex: h ? 5 : 2 }}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}>
      <div style={{ width: 26, height: 26, borderRadius: "50% 50% 50% 2px", transform: "rotate(45deg)", background: applied ? "var(--good)" : lc.c, boxShadow: "var(--sh-md)", border: "2px solid white", cursor: "pointer", display: "grid", placeItems: "center" }}>
        <span className="mono" style={{ transform: "rotate(-45deg)", color: "white", fontSize: 12, fontWeight: 700 }}>{applied ? "✓" : n}</span>
      </div>
      {h && (
        <div style={{ position: "absolute", bottom: "130%", left: "50%", transform: "translateX(-50%)", width: 190, background: "var(--ink)", color: "var(--bg)", padding: "8px 11px", borderRadius: 9, boxShadow: "var(--sh-lg)" }}>
          <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 3 }}>
            <span style={{ fontSize: 9.5, fontWeight: 700, color: applied ? "oklch(0.8 0.13 152)" : "oklch(0.85 0.06 80)" }}>{applied ? "APLICADA" : (s.lane === "geo" ? "GEO" : "SEO")}</span>
          </div>
          <div style={{ fontSize: "var(--fs-xs)", fontWeight: 600, lineHeight: 1.35 }}>{s.title}</div>
        </div>
      )}
    </div>
  );
}


function GeoTextView({ blocks, mode, contentChanges }) {
  const D = window.SURFACE_DATA;
  const rawText = D._rawGeo && D._rawGeo.answer_ready_summary
    ? null  // will use blocks
    : null;

  return (
    <div>
      <div style={{ marginBottom: 14, padding: "8px 12px", borderRadius: 8, background: "var(--geo-soft)", border: "1px solid var(--border-2)", display: "flex", alignItems: "flex-start", gap: 8, fontSize: "var(--fs-xs)", color: "var(--geo-ink)", lineHeight: 1.5 }}>
        <Icon name="spark" size={14} stroke={2} style={{ flexShrink: 0, marginTop: 1 }} />
        <span><b>Vista GEO:</b> así lee tu contenido un LLM (ChatGPT, Perplexity, Gemini) — sin CSS ni navegación, solo texto estructurado. Las mejoras GEO actúan sobre este texto.</span>
      </div>
      {blocks.map((b, i) => <ContentBlock key={b.id + i} b={b} mode={mode} />)}
      {mode === "after" && contentChanges === 0 && (
        <div style={{ textAlign: "center", color: "var(--faint)", fontSize: "var(--fs-sm)", padding: "24px 0", borderTop: "1px dashed var(--border)", marginTop: 14 }}>
          Selecciona mejoras GEO → para ver cómo queda el contenido optimizado para IA
        </div>
      )}
    </div>
  );
}


function RealPageView({ ids, appliedIds }) {
  const D = window.SURFACE_DATA;
  const [screenshot, setScreenshot] = useState(null);  // url | "loading" | "error:msg" | null
  const url = D.TARGET && D.TARGET.url ? D.TARGET.url : "";

  useEffect(() => {
    if (!url || screenshot) return;
    setScreenshot("loading");
    var headers = {"Content-Type": "application/json"};
    var key = window._APP_KEY || localStorage.getItem("sg_api_key") || "";
    if (key) headers["x-api-key"] = key;
    fetch("/v2/screenshot?url=" + encodeURIComponent(url.startsWith("http") ? url : "https://" + url), { headers })
      .then(function(r) { return r.json(); })
      .then(function(d) { setScreenshot(d.screenshot_url || "error:Sin URL de screenshot"); })
      .catch(function(e) { setScreenshot("error:" + (e.message || "Error desconocido")); });
  }, [url]);

  // Map improvement field → approximate vertical position on the page (%)
  const FIELD_POS = {
    title_tag: 4, h1: 5, meta_description: 3, og_title: 3,
    content_structure: 18, direct_answer: 12, answer_format: 12, answer_block: 12,
    keyword_density: 22, content_depth: 35, content_length: 35,
    entity_coverage: 40, factual_density: 45, citation_signals: 48,
    ai_structure: 55, faq: 65, schema_markup: 70, structured_data: 70,
    internal_links: 75, authority: 30,
  };

  const pinned = (D.SUGGESTIONS || []).filter(s => ids.includes(s.id));

  const getPinTop = (s) => {
    const pos = FIELD_POS[s.field || ""] || FIELD_POS[s.id] || 50;
    return pos;
  };

  const isLoading = screenshot === "loading";
  const isError = screenshot && screenshot.startsWith("error:");
  const errorMsg = isError ? screenshot.slice(6) : "";
  const imgUrl = screenshot && !isLoading && !isError ? screenshot : null;

  return (
    <div style={{ position: "relative", minHeight: 400 }}>
      {/* Info bar */}
      <div className="mono" style={{ position: "sticky", top: 0, zIndex: 6, fontSize: 10.5, color: "var(--faint)", background: "var(--surface)", padding: "8px 16px", borderBottom: "1px dashed var(--border-2)", display: "flex", alignItems: "center", gap: 6 }}>
        <Icon name="info" size={12} />
        {isLoading
          ? "Cargando captura real de la página…"
          : isError
            ? "No se pudo cargar el snapshot: " + errorMsg
            : imgUrl
              ? "Captura real de la página · los pins marcan dónde aplica cada cambio"
              : "Capturando página con Firecrawl…"}
      </div>

      {/* Screenshot or mock */}
      <div style={{ position: "relative" }}>
        {isLoading && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 320, gap: 12, color: "var(--muted)" }}>
            <span className="spin" style={{ width: 28, height: 28, borderRadius: 99, border: "3px solid var(--seo)", borderTopColor: "transparent", display: "inline-block" }} />
            <span style={{ fontSize: "var(--fs-sm)" }}>Renderizando página completa…</span>
          </div>
        )}

        {isError && !imgUrl && (
          <div style={{ padding: "32px 24px", textAlign: "center", color: "var(--muted)", fontSize: "var(--fs-sm)" }}>
            <Icon name="alert" size={28} style={{ marginBottom: 10, color: "var(--warn)" }} />
            <div style={{ fontWeight: 600, marginBottom: 6 }}>No se pudo capturar la página</div>
            <div style={{ fontSize: "var(--fs-xs)" }}>{errorMsg}</div>
            {errorMsg.includes("FIRECRAWL_API_KEY") && (
              <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 10, background: "var(--warn-soft)", color: "var(--warn)", fontSize: "var(--fs-xs)", fontWeight: 500 }}>
                Añade FIRECRAWL_API_KEY en Vercel → Settings → Environment Variables
              </div>
            )}
          </div>
        )}

        {imgUrl && (
          <div style={{ position: "relative", display: "inline-block", width: "100%" }}>
            <img
              src={imgUrl}
              alt="Captura de la página"
              style={{ width: "100%", display: "block", borderRadius: 0 }}
            />
            {/* Pins overlay */}
            {pinned.map((s, i) => (
              <Pin key={s.id} n={i + 1} s={s} applied={appliedIds && appliedIds.includes(s.id)}
                pos={{ t: getPinTop(s), l: 15 + (i % 4) * 20 }} />
            ))}
            {pinned.length === 0 && (
              <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", pointerEvents: "none" }}>
                <span style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 10, padding: "10px 16px", fontSize: "var(--fs-sm)", color: "var(--muted)", boxShadow: "var(--sh-sm)" }}>Marca sugerencias → para ver dónde se aplican sobre la página</span>
              </div>
            )}
          </div>
        )}
      </div>

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.7s linear infinite; }
      `}</style>
    </div>
  );
}


function SuggestionCard({ s, on, onToggle, applied, onGenerate, generating, generated }) {
  const [open, setOpen] = useState(false);
  const lc = laneColor(s.lane);
  const prioColor = s.priority === "Quick win" ? { c: "var(--warn)", s: "var(--warn-soft)" } : s.priority === "Alto impacto" ? { c: "var(--geo-ink)", s: "var(--geo-soft)" } : { c: "var(--muted)", s: "var(--bg-2)" };
  return (
    <div style={{
      flexShrink: 0,
      border: "1px solid " + (applied ? "var(--good)" : on ? lc.c : "var(--border)"), borderRadius: 13, overflow: "hidden",
      background: applied ? "var(--good-soft)" : on ? lc.soft : "var(--surface)", transition: "all 0.18s ease",
      boxShadow: (on || applied) ? "var(--sh-sm)" : "none",
    }}>
      <div style={{ display: "flex", gap: 11, padding: 13, cursor: applied ? "default" : "pointer" }} onClick={applied ? undefined : onToggle}>
        <span style={{
          width: 22, height: 22, borderRadius: 7, flexShrink: 0, marginTop: 1, display: "grid", placeItems: "center",
          background: (on || applied) ? (applied ? "var(--good)" : lc.c) : "var(--surface)", border: "1.5px solid " + (applied ? "var(--good)" : on ? lc.c : "var(--border)"),
          color: "white", transition: "all 0.14s ease",
        }}>{(on || applied) && <Icon name="check" size={13} stroke={3} />}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
            <LaneTag lane={s.lane} />
            {applied
              ? <Pill color="var(--good)" soft="var(--good-soft)" icon="check">Aplicada</Pill>
              : <Pill color={prioColor.c} soft={prioColor.s} icon={s.priority === "Quick win" ? "bolt" : undefined}>{s.priority}</Pill>}
          </div>
          <div style={{ fontWeight: 600, fontSize: "var(--fs-base)", lineHeight: 1.35, display: "flex", alignItems: "baseline", gap: 7, flexWrap: "wrap" }}>
            {(() => {
              const actionWords = { "MODIFICA": {c:"var(--seo-ink)",bg:"var(--seo-soft)"}, "AÑADE": {c:"var(--geo-ink)",bg:"var(--geo-soft)"}, "ELIMINA": {c:"var(--poor)",bg:"var(--poor-soft)"}, "AÑADIR": {c:"var(--geo-ink)",bg:"var(--geo-soft)"}, "MODIFICAR": {c:"var(--seo-ink)",bg:"var(--seo-soft)"} };
              const title = s.title || "";
              const match = Object.keys(actionWords).find(w => title.toUpperCase().startsWith(w));
              if (!match) return <span>{title}</span>;
              const col = actionWords[match];
              const rest = title.slice(match.length).replace(/^[\s:]+/, "");
              return <>
                <span style={{ display:"inline-flex", alignItems:"center", padding:"2px 8px", borderRadius:99, fontSize:"var(--fs-xs)", fontWeight:700, color:col.c, background:col.bg, whiteSpace:"nowrap", letterSpacing:"0.02em" }}>{match.charAt(0)+match.slice(1).toLowerCase()}</span>
                <span>{rest}</span>
              </>;
            })()}
          </div>
          <div style={{ fontSize: "var(--fs-xs)", color: "var(--muted)", marginTop: 3, lineHeight: 1.45 }}>{s.desc}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 9, flexWrap: "wrap" }}>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: "var(--fs-xs)", fontWeight: 700, color: "var(--good)" }}>
              <Icon name="trend" size={13} stroke={2} /> +{s.impact} pts
            </span>
            <span style={{ fontSize: "var(--fs-xs)", color: "var(--muted)" }}>Esfuerzo: {s.effort}</span>
            {!s.editsBlock && !s.addsBlock && !applied && onGenerate && (
              <button onClick={(e) => { e.stopPropagation(); onGenerate(s.id); }}
                disabled={generating}
                style={{ marginLeft: "auto", display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 11px", borderRadius: 8, border: "1px solid " + (generated ? "var(--good)" : lc.c), background: generated ? "var(--good-soft)" : lc.soft, color: generated ? "var(--good)" : lc.ink, fontSize: "var(--fs-xs)", fontWeight: 700, cursor: generating ? "default" : "pointer", opacity: generating ? 0.7 : 1 }}>
                {generating
                  ? <><span className="spin" style={{ width:11,height:11,borderRadius:99,border:"2px solid currentColor",borderTopColor:"transparent",display:"inline-block" }} /> Generando…</>
                  : generated
                    ? <><Icon name="check" size={11} stroke={3} /> En previsualización</>
                    : <><Icon name="spark" size={11} stroke={2} /> Generar con IA</>}
              </button>
            )}
            {(s.editsBlock || s.addsBlock) && (
              <button onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}

function exportPlan(items) {
  const D = window.SURFACE_DATA;
  let md = `# Plan de mejora SEO + GEO\nURL: ${D.TARGET.url}\nGenerado por Surface\n\n`;
  items.forEach((s, i) => {
    md += `## ${i + 1}. ${s.title}\n- Canal: ${s.lane.toUpperCase()} · Impacto: +${s.impact} pts · Esfuerzo: ${s.effort}\n- ${s.desc}\n`;
    const t = (s.editsBlock || s.addsBlock);
    if (t) md += `\nContenido a aplicar:\n> ${t.text}\n`;
    md += `\n- [ ] Aplicado en el CMS\n\n`;
  });
  // Append assembled page content (all changes applied)
  const contentItems = items.filter(s => s.editsBlock || s.addsBlock);
  if (contentItems.length > 0 && typeof buildBlocks === 'function') {
    const ids = contentItems.map(s => s.id);
    const blocks = buildBlocks(ids);
    md += `\n---\n## Contenido completo con mejoras aplicadas\n\n`;
    blocks.forEach(b => {
      if (b.type === 'h1') md += `# ${b.text}\n\n`;
      else if (b.type === 'h2') md += `## ${b.text}\n\n`;
      else if (b.type === 'p') md += `${b.text}\n\n`;
      else if (b.type === 'answer') md += `> ${b.text}\n\n`;
      else if (b.type === 'faq') {
        md += `### Preguntas frecuentes\n`;
        b.text.split(' · ').forEach(q => { md += `- ${q}\n`; });
        md += `\n`;
      }
    });
  }
  try {
    const blob = new Blob([md], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "plan-de-mejora-surface.md";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 500);
  } catch (e) {}
}

function Report({ scorecard, onLoadSuggestions, loadingImps }) {
  const D = window.SURFACE_DATA;
  const [selected, setSelected] = useState([]);
  const [generatingId, setGeneratingId] = useState(null);
  const [generatedIds, setGeneratedIds] = useState([]);

  const handleGenerate = async (id) => {
    const s = (D.SUGGESTIONS||[]).find(function(x){return x.id===id;});
    if (!s || generatingId) return;
    setGeneratingId(id);
    try {
      var meta = D._pageMetadata || {};
      var metaCtx = meta.h1 ? 'H1 actual: ' + (meta.h1[0]||{}).text + (meta.h1[0]&&meta.h1[0].hidden?' (visualmente oculto)':'') + '. ' : '';
      var originalText = metaCtx + (D._rawSeo&&D._rawSeo.title?D._rawSeo.title+'. ':'') + ((D._rawGeo&&D._rawGeo.answer_ready_summary)||'');
      var blockType = s.lane==='geo' ? (s.title.toLowerCase().includes('faq')||s.title.toLowerCase().includes('pregunta')?'faq':'answer') : 'section';
      var headers = {'Content-Type':'application/json'};
      var key = window._APP_KEY || localStorage.getItem('sg_api_key') || '';
      if(key) headers['x-api-key'] = key;
      var res = await fetch('/v2/generate-block', {
        method:'POST', headers:headers,
        body: JSON.stringify({original_text:originalText, instruction:s.title+': '+s.desc, block_type:blockType, language:'es'})
      });
      var data = await res.json();
      var text = data.generated_text || '';
      if (text) {
        var idx = (D.SUGGESTIONS||[]).findIndex(function(x){return x.id===id;});
        if (idx>=0) {
          var lastBlock = (D.CONTENT||[])[(D.CONTENT||[]).length-1] || {id:'h1'};
          D.SUGGESTIONS[idx] = Object.assign({}, D.SUGGESTIONS[idx], {
            kind:'content',
            addsBlock:{id:'gen-'+id, type:blockType==='faq'?'faq':blockType==='answer'?'answer':'p', after:lastBlock.id, text:text}
          });
          setGeneratedIds(function(prev){return prev.includes(id)?prev:[...prev,id];});
          setSelected(function(prev){return prev.includes(id)?prev:[...prev,id];});
        }
      }
    } catch(e) { console.error('generate-block error', e); }
    finally { setGeneratingId(null); }
  };

  // Auto-load improvements when suggestions are empty
  useEffect(() => {
    if (D.SUGGESTIONS && D.SUGGESTIONS.length === 0 && onLoadSuggestions && !loadingImps) {
      onLoadSuggestions();
    }
  }, []);
  const [mode, setMode] = useState("after");
  const [filter, setFilter] = useState("all");
  const [modal, setModal] = useState(false);

  const toggle = (id) => setSelected((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);

  const sumLane = (lane) => D.SUGGESTIONS.filter((s) => selected.includes(s.id) && s.lane === lane).reduce((a, s) => a + s.impact, 0);
  const projSeo = Math.min(100, D.SCORES.seo + sumLane("seo"));
  const projGeo = Math.min(100, D.SCORES.geo + sumLane("geo"));

  const visible = D.SUGGESTIONS.filter((s) => filter === "all" ? true : filter === "quick" ? s.priority === "Quick win" : s.lane === filter);
  const filtered = visible.slice().sort((a, b) => b.impact - a.impact);
  const allSelected = selected.length === D.SUGGESTIONS.length;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
      {/* projected score header */}

        <ProjScore lane="seo" base={D.SCORES.seo} proj={projSeo} />
        <ProjScore lane="geo" base={D.SCORES.geo} proj={projGeo} />
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
          {selected.length > 0 && (
            <span style={{ fontSize: "var(--fs-sm)", color: "var(--muted)", fontWeight: 600 }}>
              {selected.length} seleccionada{selected.length > 1 ? "s" : ""} · <span style={{ color: "var(--good)" }}>+{(projSeo - D.SCORES.seo) + (projGeo - D.SCORES.geo)} pts proyectados</span>
            </span>
          )}
          <Button variant="secondary" size="sm" icon={allSelected ? "x" : "check"} onClick={() => setSelected(allSelected ? [] : D.SUGGESTIONS.map((s) => s.id))}>
            {allSelected ? "Quitar todo" : "Seleccionar todo"}
          </Button>
          <Button size="sm" icon="bolt" disabled={selected.length === 0} onClick={() => setModal(true)}>Aplicar {selected.length || ""} cambios</Button>
        </div>
      </div>

      {/* two columns */}
      <div className="report-grid" style={{ flex: 1, display: "grid", gridTemplateColumns: "1.25fr 420px", gap: 0, minHeight: 0 }}>
        <div style={{ padding: "18px 20px 18px 24px", minWidth: 0, overflow: "hidden" }}>
          <PreviewPane selectedIds={selected} mode={mode} setMode={setMode} />
        </div>
        <div style={{ borderLeft: "1px solid var(--border)", display: "flex", flexDirection: "column", background: "var(--bg-2)", minHeight: 0 }}>
          <div style={{ padding: "16px 18px 12px", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <Icon name="bolt" size={17} stroke={2} style={{ color: "var(--seo)" }} />
              <span style={{ fontWeight: 700, fontSize: 15 }}>Sugerencias</span>
              <Pill>{filtered.length}</Pill>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {filters.map(([id, lb]) => (
                <button key={id} onClick={() => setFilter(id)}
                  style={{
                    padding: "5px 12px", borderRadius: 99, fontSize: "var(--fs-xs)", fontWeight: 600, cursor: "pointer",
                    border: "1px solid " + (filter === id ? "transparent" : "var(--border)"),
                    background: filter === id ? "var(--ink)" : "var(--surface)", color: filter === id ? "var(--bg)" : "var(--muted)",
                    transition: "all 0.14s ease",
                  }}>{lb}</button>
              ))}
            </div>
          </div>
          <div className="scroll-area" style={{ padding: "0 18px 20px", display: "flex", flexDirection: "column", gap: 9 }}>
            {loadingImps && (
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {[1,2,3,4].map(i => (
                  <div key={i} style={{ borderRadius: 13, background: "var(--bg-2)", border: "1px solid var(--border)", padding: 13, display: "flex", gap: 11 }}>

                      <div style={{ height: 10, borderRadius: 6, background: "var(--border)", width: "40%" }} />
                      <div style={{ height: 13, borderRadius: 6, background: "var(--border)", width: "85%" }} />
                      <div style={{ height: 10, borderRadius: 6, background: "var(--border)", width: "60%" }} />
                    </div>
                  </div>
                ))}
                <div style={{ textAlign: "center", padding: "8px 0", fontSize: "var(--fs-xs)", color: "var(--muted)", display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }}>
                  <span className="spin" style={{ width: 12, height: 12, borderRadius: 99, border: "2px solid var(--seo)", borderTopColor: "transparent", display: "inline-block" }} />
                  Generando plan de mejora con IA…
                </div>
              </div>
            )}
            {!loadingImps && filtered.map((s) => <SuggestionCard key={s.id} s={s} on={selected.includes(s.id)} onToggle={() => toggle(s.id)} onGenerate={handleGenerate} generating={generatingId===s.id} generated={generatedIds.includes(s.id)} />)}
            {!loadingImps && filtered.length === 0 && D.SUGGESTIONS.length > 0 && (
              <div style={{ textAlign: "center", padding: 24, color: "var(--faint)", fontSize: "var(--fs-sm)" }}>No hay sugerencias con este filtro.</div>
            )}
          </div>
        </div>
      </div>

      {modal && <ResolutionModal selected={selected} onClose={() => setModal(false)} />}

      <style>{`
        @keyframes blockIn { from { transform: translateY(6px); } to { transform: none; } }
        @media (max-width: 1080px) { .report-grid { grid-template-columns: 1fr !important; } }
      `}</style>
    </div>
  );
}

const filters = [["all", "Todas"], ["quick", "Quick wins"], ["seo", "SEO"], ["geo", "GEO"]];

function ProjScore({ lane, base, proj }) {

            );

        <div className="card rise-in" style={{ overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "var(--bg-2)" }}>
                {["Página", "Tipo", "Tráfico/mes", "SEO", "GEO", ""].map((h, i) => (

              {dom.pages.slice().sort((a, b) => b.traffic - a.traffic).map((p) => (

                        <div className="mono" style={{ fontSize: "var(--fs-xs)", color: "var(--muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.url}</div>
                      </div>

                  <td style={{ padding: "12px 16px" }}><Pill>{p.type}</Pill></td>
                  <td className="mono" style={{ padding: "12px 16px", textAlign: "right", fontSize: "var(--fs-sm)", color: "var(--ink-2)" }}>{p.traffic.toLocaleString("es")}</td>
                  <td style={{ padding: "12px 16px", textAlign: "right" }}><ScorePip v={p.seo} /></td>
                  <td style={{ padding: "12px 16px", textAlign: "right" }}><ScorePip v={p.geo} /></td>
                  <td style={{ padding: "12px 16px", textAlign: "right" }}><Icon name="chevR" size={16} style={{ color: "var(--faint)" }} /></td>
                </tr>
              ))}

        </div>
      </div>
      <style>{`.page-row:hover { background: var(--bg-2); }`}</style>
    </div>
  );
}

function ScorePip({ v }) {
  const col = scoreColor(v).c;
  return <span className="mono" style={{ display: "inline-flex", alignItems: "center", justifyContent: "flex-end", gap: 6, fontWeight: 600, fontSize: "var(--fs-sm)" }}>
    <span style={{ width: 7, height: 7, borderRadius: 99, background: col }} />{v}
  </span>;
}
